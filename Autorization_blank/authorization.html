<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Editor Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/Autorization_blank/authorization.css" />
    <link rel="shortcut icon" href="/img/favicon.png" type="image/x-icon" />
  </head>
  <body>
    <!-- Container for the authentication/login form -->
    <div class="auth-container">
      <h1 class="auth-title">Editor Login</h1>
      <p class="auth-subtitle">Вхід для редакторів новин</p>

      <!-- Login form -->
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Електронна пошта</label>
          <input
            type="email"
            id="email"
            placeholder="editor@pinkwave.ie"
            required
          />
        </div>

        <!-- Password input field -->
        <div class="form-group">
          <label for="password">Пароль</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            required
          />
        </div>

        <button type="submit" class="login-btn">Увійти</button>
      </form>

      <p id="errorMessage">Невірна електронна пошта або пароль</p>

      <div class="footer-text">PinkWave News • Editor Panel</div>
    </div>
    <script src="/Autorization_blank/authorization.js"></script>
  </body>
</html>
